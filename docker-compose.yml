services:
  rflow:
    build: .
    image: rflow
    container_name: rflow_dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/workspace/riemannian_flow_det
    volumes:
      - .:/workspace/riemannian_flow_det   # 코드 마운트 (수정 즉시 반영)
      - ./data:/workspace/riemannian_flow_det/data
      - ./outputs:/workspace/riemannian_flow_det/outputs
    ports:
      - "6006:6006"   # TensorBoard
    stdin_open: true
    tty: true
    working_dir: /workspace/riemannian_flow_det
    command: bash
