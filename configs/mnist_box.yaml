# ───────────────────────────────────────────────────────────
# MNIST Box toy detection (Phase 2.5)
# Canvas 256×256, digits 0~9 (1 each), scale [14,56], non-overlap
# 1-to-1 class-indexed boxes (no Hungarian matching)
# ───────────────────────────────────────────────────────────

# --- Dataset ---
dataset:                    mnist_box
data_root:                  data
mnist_root:                 data/mnist
mnist_image_size:           256
mnist_scale_range:          [14, 56]
mnist_num_samples_train:    50000
mnist_num_samples_val:      5000
mnist_bbox_mode:            fixed        # fixed | tight
mnist_background:           zero         # zero  | noise
mnist_download:             true

# mnist_box canvas는 이미 256 고정 → resize는 의미 없지만, 호환성 위해 명시
min_size:                   256
max_size:                   256

# --- Model ---
hidden_dim:                 192
num_layers:                 4
num_heads:                  6
mlp_ratio:                  4
num_queries:                10           # 항상 10개 object (class당 1개)
backbone_type:              fpn          # fpn | dinov2
backbone_pretrained:        true
trajectory:                 riemannian   # riemannian | linear

# --- DataLoader ---
batch_size:                 32
num_workers:                4
pin_memory:                 true

# --- Training (MB5 overfit용 기본) ---
lr:                         1.0e-4
weight_decay:               0.0
grad_clip_norm:             1.0
max_steps:                  2000
log_interval:               100
seed:                       0
