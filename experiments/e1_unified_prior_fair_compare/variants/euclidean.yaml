# e1 / Euclidean — 통일 prior (N(0,I) state) + cxcywh space interpolation
# 동일 seed → riemannian.yaml과 완전히 같은 b₀에서 출발.
__tag__: euclidean
__max_steps__: 5000
__lr__: 3.0e-4
__lr_schedule__: cosine
__ode_steps__: 50

dataset: mnist_box
mnist_image_size: 256
mnist_scale_range: [14, 56]
mnist_num_samples_train: 1
mnist_num_samples_val: 1
mnist_bbox_mode: fixed
mnist_background: zero
min_size: 256
max_size: 256

hidden_dim: 192
num_layers: 4
num_heads: 6
mlp_ratio: 4
num_queries: 10
backbone_type: fpn
backbone_pretrained: true
trajectory: linear           # ★ 차이점 (모델 내부 key name은 "linear", 의미는 Euclidean)

batch_size: 1
num_workers: 0
pin_memory: false
weight_decay: 0.0
grad_clip_norm: 1.0
seed: 0
