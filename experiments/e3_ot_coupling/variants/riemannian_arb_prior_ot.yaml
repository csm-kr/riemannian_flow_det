# e2 / Riemannian + arbitrary Euclidean prior — 2×2 ablation 4th cell
# Prior: clip(N(0.5, 1/6²), 0.02, 1) in cxcywh (same as linear_arb_prior)
# Interp: state space, constant u_t = b1 − b0 (same as riemannian)
# 목적: prior entropy 부족 효과를 interp 공간 효과와 분리.
__tag__: riemannian_arb_prior_ot
ot_coupling: true
__max_steps__: 5000
__lr__: 3.0e-4
__lr_schedule__: cosine
__ode_steps__: 50

dataset: mnist_box
mnist_image_size: 256
mnist_scale_range: [14, 56]
mnist_num_samples_train: 1
mnist_num_samples_val: 1
mnist_bbox_mode: fixed
mnist_background: zero
min_size: 256
max_size: 256

hidden_dim: 192
num_layers: 4
num_heads: 6
mlp_ratio: 4
num_queries: 10
backbone_type: fpn
backbone_pretrained: true
trajectory: riemannian_arb_prior  # ★ arb prior + state interp

batch_size: 1
num_workers: 0
pin_memory: false
weight_decay: 0.0
grad_clip_norm: 1.0
seed: 0
