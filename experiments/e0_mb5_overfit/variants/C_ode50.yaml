# Variant C — ODE 스텝 수를 10 → 50으로 증가 (추론만 변경)
# 가설: 추론 품질 한계는 학습보다 Euler integrator의 이산화 오차가 클 수 있음.
#       ode_steps 5배 증가로 박스 위치 정밀도 개선 여부 측정.
__tag__: C_ode50
__max_steps__: 1500
__lr__: 1.0e-4
__lr_schedule__: const
__ode_steps__: 50

dataset: mnist_box
mnist_image_size: 256
mnist_scale_range: [14, 56]
mnist_num_samples_train: 1
mnist_num_samples_val: 1
mnist_bbox_mode: fixed
mnist_background: zero
min_size: 256
max_size: 256

hidden_dim: 192
num_layers: 4
num_heads: 6
mlp_ratio: 4
num_queries: 10
backbone_type: fpn
backbone_pretrained: true
trajectory: riemannian

batch_size: 1
num_workers: 0
pin_memory: false
weight_decay: 0.0
grad_clip_norm: 1.0
seed: 0
