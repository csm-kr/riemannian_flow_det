# Variant A — Baseline (MB5 기본 설정)
# 의도: 현재 플랜이 지정한 기본값만으로 1-image overfit. 비교 기준점.
__tag__: A_baseline
__max_steps__: 1500
__lr__: 1.0e-4
__lr_schedule__: const
__ode_steps__: 10

# ── dataset ──
dataset: mnist_box
mnist_image_size: 256
mnist_scale_range: [14, 56]
mnist_num_samples_train: 1
mnist_num_samples_val: 1
mnist_bbox_mode: fixed
mnist_background: zero
min_size: 256
max_size: 256

# ── model ──
hidden_dim: 192
num_layers: 4
num_heads: 6
mlp_ratio: 4
num_queries: 10
backbone_type: fpn
backbone_pretrained: true
trajectory: riemannian

# ── train ──
batch_size: 1
num_workers: 0
pin_memory: false
weight_decay: 0.0
grad_clip_norm: 1.0
seed: 0
