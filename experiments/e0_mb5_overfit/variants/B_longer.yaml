# Variant B — 학습을 길게 + cosine LR decay
# 가설: flow matching은 t 샘플링 변동 때문에 loss가 본질적으로 noisy →
#       step 수를 늘리고 LR을 감쇠하면 tail loss / box error가 낮아진다.
__tag__: B_longer
__max_steps__: 5000
__lr__: 3.0e-4
__lr_schedule__: cosine
__ode_steps__: 10

dataset: mnist_box
mnist_image_size: 256
mnist_scale_range: [14, 56]
mnist_num_samples_train: 1
mnist_num_samples_val: 1
mnist_bbox_mode: fixed
mnist_background: zero
min_size: 256
max_size: 256

hidden_dim: 192
num_layers: 4
num_heads: 6
mlp_ratio: 4
num_queries: 10
backbone_type: fpn
backbone_pretrained: true
trajectory: riemannian

batch_size: 1
num_workers: 0
pin_memory: false
weight_decay: 0.0
grad_clip_norm: 1.0
seed: 0
